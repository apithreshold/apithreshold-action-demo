name: "APIThreshold quality gate"
description: "Run apithreshold gate on an OpenAPI spec (composite action proof)."
branding:
  icon: shield
  color: red
inputs:
  spec:
    description: "Path to OpenAPI spec file (repo-relative)"
    required: true
  mode:
    description: "learning | warning | enforcing | strict"
    required: false
    default: learning
  install-source:
    description: "git (backend repo) | pypi — apithreshold is not on PyPI yet; default is git"
    required: false
    default: git
  backend-repo:
    description: "Git URL for pip install (hatch package at repo root). Override for forks."
    required: false
    default: "https://github.com/apithreshold/backend.git"
  openai_api_key:
    description: "OpenAI API key for apithreshold gate (pass secrets.OPENAI_API_KEY from the workflow)."
    required: true
  backend_github_token:
    description: "Optional PAT with Contents: Read on apithreshold/backend when that repo is private."
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install apithreshold
      shell: bash
      env:
        BACKEND_GITHUB_TOKEN: ${{ inputs.backend_github_token }}
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-source }}" = "pypi" ]; then
          pip install apithreshold
        else
          REPO="${{ inputs.backend-repo }}"
          if [ -n "${BACKEND_GITHUB_TOKEN:-}" ]; then
            case "$REPO" in
              https://github.com/*)
                REPO="https://x-access-token:${BACKEND_GITHUB_TOKEN}@github.com/${REPO#https://github.com/}"
                ;;
            esac
          fi
          pip install "git+${REPO}"
        fi

    - name: Run gate
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
      run: |
        set -euo pipefail
        apithreshold gate "${{ inputs.spec }}" \
          --mode "${{ inputs.mode }}" \
          --project-id "${{ github.repository }}"
