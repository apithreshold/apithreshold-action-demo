name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Clone backend with git + trimmed token (org secrets often include a trailing newline when
# pasted — actions/checkout passes the raw value and Git returns 403). Probe with gh first.
env:
  APITHRESHOLD_SPEC: openapi.yaml
  # enforcing = exit non-zero when score < threshold (CI fails on push, PR, and dispatch).
  # To collect data without failing CI, temporarily set learning (CLI may still print Gate Blocked).
  APITHRESHOLD_MODE: enforcing
  INSTALL_SOURCE: git
  BACKEND_REPOSITORY: apithreshold/backend
  BACKEND_REF: main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Backend auth — diagnose
        run: |
          set -euo pipefail
          echo "BACKEND_REPOSITORY=${BACKEND_REPOSITORY} BACKEND_REF=${BACKEND_REF}"
          echo "BACKEND_IS_PUBLIC (repo Actions variable, must be exactly 'true' to use only GITHUB_TOKEN): '${{ vars.BACKEND_IS_PUBLIC }}'"
          case "${{ vars.BACKEND_IS_PUBLIC }}" in
            true) echo "Mode: treat backend as public → clone uses github.token from this repo." ;;
            *)    echo "Mode: treat backend as private → clone uses BACKEND_GITHUB_TOKEN (org or repo secret, exact name)." ;;
          esac

      - name: Backend clone — require PAT unless backend is public
        if: ${{ vars.BACKEND_IS_PUBLIC != 'true' }}
        env:
          PAT: ${{ secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::BACKEND_GITHUB_TOKEN is missing or unavailable (common on PRs from forks). The job GITHUB_TOKEN for this repository cannot clone a private ${BACKEND_REPOSITORY}. Fix: add repository secret BACKEND_GITHUB_TOKEN (fine-grained PAT: Contents Read on that repo; SSO-authorized for the org if required). If ${BACKEND_REPOSITORY} is public, set repository Actions variable BACKEND_IS_PUBLIC to the exact string true. See README."
            exit 1
          fi
          echo "BACKEND_GITHUB_TOKEN is non-empty (next step trims CR/LF)."

      - name: Clone apithreshold backend (trim PAT; probe then shallow clone)
        shell: bash
        env:
          RAW_TOKEN: ${{ vars.BACKEND_IS_PUBLIC == 'true' && github.token || secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Org/UI secrets often include a trailing newline — breaks HTTPS git auth (403).
          GH_TOKEN="$(printf '%s' "${RAW_TOKEN}" | tr -d '\n\r')"
          export GH_TOKEN
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Token is empty after trim. Check BACKEND_GITHUB_TOKEN / BACKEND_IS_PUBLIC."
            exit 1
          fi
          echo "Anonymous probe: GET /repos/${BACKEND_REPOSITORY} (no auth — sees public repos only)…"
          ANON_HTTP=$(curl -sS -o /tmp/anon_repo.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${BACKEND_REPOSITORY}" || echo "000")
          echo "Anonymous HTTP status: ${ANON_HTTP}"
          case "${ANON_HTTP}" in
            200) echo "Repo metadata is public (anyone can see it exists). If the PAT probe below fails with 404, the token is wrong user, corrupted, or not the PAT you think (wrong secret name / wrong org secret mapping)." ;;
            404) echo "Anonymous 404: repo is private, renamed/moved, or slug is wrong — OR GitHub hides a private repo. Your PAT must explicitly include ${BACKEND_REPOSITORY} (fine-grained: Repository access + Contents:Read + Metadata:Read) and SAML SSO authorized for org." ;;
            *)   echo "Unexpected anonymous status ${ANON_HTTP}." ;;
          esac
          echo "REST probe (authenticated): GET /repos/${BACKEND_REPOSITORY}…"
          if ! gh api "repos/${BACKEND_REPOSITORY}" --header "accept: application/vnd.github+json" \
              --jq '{full_name, private, visibility}' 2>gh_api_err.txt; then
            echo "::error::Authenticated GET /repos/${BACKEND_REPOSITORY} failed (see gh stderr below). HTTP 404 here almost always means: the token identity cannot read that repo (GitHub often uses 404 instead of 403 for private repos). Fix: (1) Fine-grained PAT → Repository access must list **${BACKEND_REPOSITORY}** + **Contents: Read** + **Metadata: Read**. (2) SAML: **Authorize** the PAT for org **${BACKEND_REPOSITORY%%/*}**. (3) Confirm **BACKEND_GITHUB_TOKEN** secret value is that PAT (org secret allowed for this repo, exact name). (4) Confirm slug matches GitHub (owner/casing). gh stderr:"
            cat gh_api_err.txt
            exit 1
          fi
          rm -rf _backend_src
          echo "Shallow clone ${BACKEND_REPOSITORY} @ ${BACKEND_REF}…"
          if ! git clone --depth 1 --branch "${BACKEND_REF}" \
              "https://x-access-token:${GH_TOKEN}@github.com/${BACKEND_REPOSITORY}.git" \
              _backend_src 2>git_clone_err.txt; then
            echo "::error::git clone failed. If REST probe passed but clone failed, try a different BACKEND_REF (default branch). git stderr:"
            cat git_clone_err.txt
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install apithreshold
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${INSTALL_SOURCE}" = "pypi" ]; then
            pip install apithreshold
          else
            pip install "./_backend_src"
          fi

      - name: Run APIThreshold gate
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -uo pipefail
          set +e
          apithreshold gate "${APITHRESHOLD_SPEC}" \
            --mode "${APITHRESHOLD_MODE}" \
            --project-id "${{ github.repository }}" 2>&1 | tee gate_full.log
          gate_rc=${PIPESTATUS[0]}
          set -e
          if [ "$gate_rc" -ne 0 ]; then
            # Pull human-facing numbers out of Rich/log noise for annotations + summary.
            GATE_SCORELINE="$(grep -oE 'score [0-9.]+ < threshold [0-9.]+' gate_full.log | tail -1 || true)"
            GATE_PCTLINE="$(grep -oE 'Score [0-9.]+% below [a-z]+ threshold [0-9.]+%' gate_full.log | tail -1 || true)"
            GATE_HEADLINE="${GATE_SCORELINE:-(score line not parsed)}${GATE_PCTLINE:+ — }${GATE_PCTLINE}"
            {
              echo "### APIThreshold gate failed"
              echo ""
              echo "**${GATE_HEADLINE}**"
              echo ""
              echo "- Exit code: **${gate_rc}** · Mode: **\`${APITHRESHOLD_MODE}\`** · Spec: **\`${APITHRESHOLD_SPEC}\`**"
              echo ""
              echo "#### Why the log looks noisy"
              echo "Lines starting with \`DEBUG\` are diagnostic; the **Gate Blocked** / **Blocking Issues** panels above them are what failed the run."
              echo ""
              echo "#### What to do next"
              echo ""
              echo "1. In this job log, search for **Gate Blocked** and **Blocking Issues** (and agent names: RiskAssessor, QualityScorer, TestGenerator) for spec-specific hints."
              echo "2. **Improve \`${APITHRESHOLD_SPEC}\`**: schemas for bodies, documented 4xx/5xx error responses, \`securitySchemes\` / \`security\`, summaries, examples, tags, pagination."
              echo "3. **Reproduce locally:**"
              echo "   \`\`\`bash"
              echo "   apithreshold gate ${APITHRESHOLD_SPEC} --mode ${APITHRESHOLD_MODE} --project-id ${{ github.repository }}"
              echo "   \`\`\`"
              echo "4. **Policy:** raise quality / thresholds in product config, or set \`APITHRESHOLD_MODE: learning\` in workflow \`env\` for non-blocking runs."
              echo ""
              echo "---"
              echo "_Summary from \`.github/workflows/apithreshold-gate.yml\`; full detail stays in the CLI log above._"
            } >> "${GITHUB_STEP_SUMMARY}"
            # Short annotation for PR “Files / Checks” UI (GitHub prefixes with Error:)
            echo "::error title=APIThreshold gate (${APITHRESHOLD_MODE})::${GATE_HEADLINE}. Open the job Summary tab for next steps; expand this step for Gate Blocked / Blocking Issues panels above the DEBUG lines."
            exit "$gate_rc"
          fi
