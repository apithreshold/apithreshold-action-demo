name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      spec_path:
        description: "OpenAPI file to gate (happy-path spec uses a demo-only enforcing threshold in CI; fail demo exercises explain/report)."
        type: choice
        required: true
        default: openapi.yaml
        options:
          - openapi.yaml
          - demo/openapi-ci-happy-path.yaml
          - demo/openapi-demo-fail.yaml
      mode:
        description: "Gate mode — enforcing fails the job when score is below threshold."
        type: choice
        required: true
        default: enforcing
        options:
          - enforcing
          - learning
          - warning
          - strict

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Clone backend with git + trimmed token (org secrets often include a trailing newline when
# pasted — actions/checkout passes the raw value and Git returns 403). Probe with gh first.
env:
  # Spec and mode default here for push/PR; workflow_dispatch overrides via job env below.
  INSTALL_SOURCE: git
  BACKEND_REPOSITORY: apithreshold/backend
  BACKEND_REF: main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APITHRESHOLD_SPEC: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.spec_path || 'openapi.yaml' }}
      APITHRESHOLD_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'enforcing' }}
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Summary — run context (for presenters)
        run: |
          {
            echo "## APIThreshold gate — what this run is doing"
            echo ""
            echo "This job **parses your OpenAPI**, runs the APIThreshold pipeline (**risk → generated tests → quality score**), then applies a **threshold** in the selected **mode**."
            echo ""
            echo "| | |"
            echo "|:--|:--|"
            echo "| **Spec** | \`${APITHRESHOLD_SPEC}\` |"
            echo "| **Mode** | \`${APITHRESHOLD_MODE}\` |"
            echo "| **Trigger** | \`${GITHUB_EVENT_NAME}\` |"
            echo "| **Ref** | \`${GITHUB_REF_NAME}\` @ \`${GITHUB_SHA:0:7}\` |"
            echo "| **Workflow run** | [Open run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo ""
            echo "### Where to look (60-second tour)"
            echo ""
            echo "1. **This Summary** (scroll): gate headline, checklist, verbatim CLI log, and on failure **LLM recommendations**."
            echo "2. **Steps** (left): expand **Run APIThreshold gate**; on failure, **Gate failure recommendations (explain + report)**."
            echo "3. **Artifacts**: **apithreshold-gate-full-log** every time; **apithreshold-gate-recommendations** when the gate failed."
            echo ""
            echo "_Live demo tips: **Happy path** — **demo/openapi-ci-happy-path.yaml** + **enforcing** (workflow seeds a **demo-only** low enforcing threshold so the job stays green despite LLM score variance). **Failure path** — **demo/openapi-demo-fail.yaml** + **enforcing** for predictable fail plus explain/report._"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Backend auth — diagnose
        run: |
          set -euo pipefail
          echo "BACKEND_REPOSITORY=${BACKEND_REPOSITORY} BACKEND_REF=${BACKEND_REF}"
          echo "BACKEND_IS_PUBLIC (repo Actions variable, must be exactly 'true' to use only GITHUB_TOKEN): '${{ vars.BACKEND_IS_PUBLIC }}'"
          case "${{ vars.BACKEND_IS_PUBLIC }}" in
            true) echo "Mode: treat backend as public → clone uses github.token from this repo." ;;
            *)    echo "Mode: treat backend as private → clone uses BACKEND_GITHUB_TOKEN (org or repo secret, exact name)." ;;
          esac

      - name: Backend clone — require PAT unless backend is public
        if: ${{ vars.BACKEND_IS_PUBLIC != 'true' }}
        env:
          PAT: ${{ secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::BACKEND_GITHUB_TOKEN is missing or unavailable (common on PRs from forks). The job GITHUB_TOKEN for this repository cannot clone a private ${BACKEND_REPOSITORY}. Fix: add repository secret BACKEND_GITHUB_TOKEN (fine-grained PAT: Contents Read on that repo; SSO-authorized for the org if required). If ${BACKEND_REPOSITORY} is public, set repository Actions variable BACKEND_IS_PUBLIC to the exact string true. See README."
            exit 1
          fi
          echo "BACKEND_GITHUB_TOKEN is non-empty (next step trims CR/LF)."

      - name: Clone apithreshold backend (trim PAT; probe then shallow clone)
        shell: bash
        env:
          RAW_TOKEN: ${{ vars.BACKEND_IS_PUBLIC == 'true' && github.token || secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Org/UI secrets often include a trailing newline — breaks HTTPS git auth (403).
          GH_TOKEN="$(printf '%s' "${RAW_TOKEN}" | tr -d '\n\r')"
          export GH_TOKEN
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Token is empty after trim. Check BACKEND_GITHUB_TOKEN / BACKEND_IS_PUBLIC."
            exit 1
          fi
          echo "Anonymous probe: GET /repos/${BACKEND_REPOSITORY} (no auth — sees public repos only)…"
          ANON_HTTP=$(curl -sS -o /tmp/anon_repo.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${BACKEND_REPOSITORY}" || echo "000")
          echo "Anonymous HTTP status: ${ANON_HTTP}"
          case "${ANON_HTTP}" in
            200) echo "Repo metadata is public (anyone can see it exists). If the PAT probe below fails with 404, the token is wrong user, corrupted, or not the PAT you think (wrong secret name / wrong org secret mapping)." ;;
            404) echo "Anonymous 404: repo is private, renamed/moved, or slug is wrong — OR GitHub hides a private repo. Your PAT must explicitly include ${BACKEND_REPOSITORY} (fine-grained: Repository access + Contents:Read + Metadata:Read) and SAML SSO authorized for org." ;;
            *)   echo "Unexpected anonymous status ${ANON_HTTP}." ;;
          esac
          echo "REST probe (authenticated): GET /repos/${BACKEND_REPOSITORY}…"
          if ! gh api "repos/${BACKEND_REPOSITORY}" --header "accept: application/vnd.github+json" \
              --jq '{full_name, private, visibility}' 2>gh_api_err.txt; then
            echo "::error::Authenticated GET /repos/${BACKEND_REPOSITORY} failed (see gh stderr below). HTTP 404 here almost always means: the token identity cannot read that repo (GitHub often uses 404 instead of 403 for private repos). Fix: (1) Fine-grained PAT → Repository access must list **${BACKEND_REPOSITORY}** + **Contents: Read** + **Metadata: Read**. (2) SAML: **Authorize** the PAT for org **${BACKEND_REPOSITORY%%/*}**. (3) Confirm **BACKEND_GITHUB_TOKEN** secret value is that PAT (org secret allowed for this repo, exact name). (4) Confirm slug matches GitHub (owner/casing). gh stderr:"
            cat gh_api_err.txt
            exit 1
          fi
          rm -rf _backend_src
          echo "Shallow clone ${BACKEND_REPOSITORY} @ ${BACKEND_REF}…"
          if ! git clone --depth 1 --branch "${BACKEND_REF}" \
              "https://x-access-token:${GH_TOKEN}@github.com/${BACKEND_REPOSITORY}.git" \
              _backend_src 2>git_clone_err.txt; then
            echo "::error::git clone failed. If REST probe passed but clone failed, try a different BACKEND_REF (default branch). git stderr:"
            cat git_clone_err.txt
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install apithreshold
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${INSTALL_SOURCE}" = "pypi" ]; then
            pip install apithreshold
          else
            pip install "./_backend_src"
          fi

      # Bearer-gated CRUD + default auth overlay → LLM scores often << 95% enforcing.
      # Seed a demo-only threshold for this spec so "enforcing" stays a reliable green CI story.
      - name: Demo-only gate threshold (happy-path spec)
        if: ${{ env.APITHRESHOLD_SPEC == 'demo/openapi-ci-happy-path.yaml' }}
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          state_dir = Path.home() / ".apithreshold" / "state" / repo
          state_dir.mkdir(parents=True, exist_ok=True)
          path = state_dir / "gate_state.json"
          state = {
              "project_id": repo,
              "current_mode": "enforcing",
              "created_at": datetime.now(timezone.utc).isoformat(),
              "config": {"threshold_enforcing": 15.0},
              "latest_report": None,
              "history": [],
          }
          path.write_text(json.dumps(state, indent=2))
          print(f"Seeded gate_state.json with threshold_enforcing=15.0 for {path}")
          PY

      - name: Run APIThreshold gate
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -uo pipefail
          set +e
          apithreshold gate "${APITHRESHOLD_SPEC}" \
            --mode "${APITHRESHOLD_MODE}" \
            --project-id "${{ github.repository }}" 2>&1 | tee gate_full.log
          gate_rc=${PIPESTATUS[0]}
          set -e
          # Verbatim capture: same bytes as the Actions step log (tee). ~1MB cap for in-Summary embed (GitHub limit).
          LOG_BYTES="$(wc -c < gate_full.log | awk '{print $1}')"
          SUMMARY_MAX=950000
          append_verbatim_log() {
            echo "### Verbatim gate output (same as workflow log + artifact)"
            echo ""
            echo "File size: **${LOG_BYTES}** bytes. Artifact **apithreshold-gate-full-log** always contains the full file. You can also download the whole job log from the run (**⋯** → **Download log archive**)."
            echo ""
            if [ "${LOG_BYTES}" -le "${SUMMARY_MAX}" ] 2>/dev/null; then
              echo "Full log embedded below (under Summary size limit)."
              echo ""
              echo '```text'
              cat gate_full.log
              echo '```'
            else
              echo "Log exceeds Summary safe size; **artifact** is the complete verbatim capture. Last **800** lines below for quick scan."
              echo ""
              echo '```text'
              tail -n 800 gate_full.log
              echo '```'
            fi
          }
          if [ "$gate_rc" -ne 0 ]; then
            GATE_SCORELINE="$(grep -oE 'score [0-9.]+ < threshold [0-9.]+' gate_full.log | tail -1 || true)"
            GATE_PCTLINE="$(grep -oE 'Score [0-9.]+% below [a-z]+ threshold [0-9.]+%' gate_full.log | tail -1 || true)"
            GATE_HEADLINE="${GATE_SCORELINE:-(score line not parsed)}${GATE_PCTLINE:+ — }${GATE_PCTLINE}"
            {
              echo "### APIThreshold gate failed"
              echo ""
              echo "**${GATE_HEADLINE}**"
              echo ""
              echo "- Exit code: **${gate_rc}** · Mode: **\`${APITHRESHOLD_MODE}\`** · Spec: **\`${APITHRESHOLD_SPEC}\`**"
              echo ""
              echo "#### Why the log looks noisy"
              echo "Lines starting with \`DEBUG\` are diagnostic; the **Gate Blocked** / **Blocking Issues** panels above them are what failed the run."
              echo ""
              echo "#### What to do next"
              echo ""
              echo "1. **LLM recommendations:** open **Gate failure recommendations (explain + report)** in this job, download artifact **apithreshold-gate-recommendations**, and check Summary section **LLM recommendations (after failure)**."
              echo "2. In this job log, search for **Gate Blocked** and **Blocking Issues** (and agent names: RiskAssessor, QualityScorer, TestGenerator) for spec-specific hints."
              echo "3. **Improve \`${APITHRESHOLD_SPEC}\`**: schemas for bodies, documented 4xx/5xx error responses, \`securitySchemes\` / \`security\`, summaries, examples, tags, pagination."
              echo "4. **Reproduce locally:**"
              echo "   \`\`\`bash"
              echo "   apithreshold gate ${APITHRESHOLD_SPEC} --mode ${APITHRESHOLD_MODE} --project-id ${{ github.repository }}"
              echo "   \`\`\`"
              echo "5. **Policy:** raise quality / thresholds in product config, or set \`APITHRESHOLD_MODE: learning\` in workflow \`env\` for non-blocking runs."
              echo ""
              append_verbatim_log
              echo ""
              echo "---"
              echo "_Summary from \`.github/workflows/apithreshold-gate.yml\`._"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error title=APIThreshold gate (${APITHRESHOLD_MODE})::${GATE_HEADLINE}. Summary embeds full log if under size cap; otherwise use artifact + Download log archive. Expand **Run APIThreshold gate** for live step log."
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              {
                echo "### APIThreshold gate — blocked"
                echo ""
                echo "**${GATE_HEADLINE}**"
                echo ""
                echo "| Field | Value |"
                echo "|------|-------|"
                echo "| Mode | \`${APITHRESHOLD_MODE}\` |"
                echo "| Spec | \`${APITHRESHOLD_SPEC}\` |"
                echo "| Run | [Open workflow run](${RUN_URL}) — use the **Summary** tab for checklist + verbatim log + LLM recommendations |"
                echo ""
                echo "**Next steps for reviewers:** expand **Gate failure recommendations (explain + report)** in the job log; download **apithreshold-gate-recommendations** and **apithreshold-gate-full-log** from **Artifacts**."
              } > gate_pr_comment.md
            fi
            exit "$gate_rc"
          fi
          {
            echo "### APIThreshold gate passed"
            echo ""
            echo "Mode **\`${APITHRESHOLD_MODE}\`** on **\`${APITHRESHOLD_SPEC}\`**."
            echo ""
            echo "Complete **${LOG_BYTES}**-byte gate output (same bytes as the step log):"
            echo ""
            echo "1. Artifact **apithreshold-gate-full-log** (this run, verbatim \`gate_full.log\`)."
            echo "2. Expand **Run APIThreshold gate** above for the live log stream."
            echo "3. Run **⋯** (top right of the workflow run) → **Download log archive** for all steps as files."
          } >> "${GITHUB_STEP_SUMMARY}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            {
              echo "### APIThreshold gate — passed"
              echo ""
              echo "Mode **\`${APITHRESHOLD_MODE}\`** on spec **\`${APITHRESHOLD_SPEC}\`**."
              echo ""
              echo "| Field | Value |"
              echo "|------|-------|"
              echo "| Run | [Open workflow run](${RUN_URL}) — **Summary** has the verbatim log; **apithreshold-gate-full-log** matches the step output |"
            } > gate_pr_comment.md
          fi

      # Gate stdout is Rich panels + DEBUG only; full remediation needs follow-up LLM calls.
      - name: Gate failure recommendations (explain + report)
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APITHRESHOLD_SPEC: ${{ env.APITHRESHOLD_SPEC }}
        run: |
          set -euo pipefail
          STATE="${HOME}/.apithreshold/state/${GITHUB_REPOSITORY}/gate_state.json"
          if [[ ! -f "${STATE}" ]]; then
            echo "::warning::No gate state at ${STATE}; skipping explain/report."
            exit 0
          fi
          python3 <<'PY'
          import json
          import os
          import pathlib
          import sys

          repo = os.environ.get("GITHUB_REPOSITORY", "default")
          state_path = pathlib.Path.home() / ".apithreshold" / "state" / repo / "gate_state.json"
          if not state_path.is_file():
              print("Missing state", state_path, file=sys.stderr)
              sys.exit(2)
          data = json.loads(state_path.read_text())
          hist = data.get("history") or []
          if not hist:
              print("Empty history; skipping explain/report", file=sys.stderr)
              sys.exit(2)
          last = hist[-1]
          gate_result = {
              "passed": last["passed"],
              "mode": last["mode"],
              "score": last["score"],
              "threshold": last["threshold"],
              "blocking_issues": last.get("blocking_issues") or [],
              "exit_code": last["exit_code"],
              "spec_hash": last["spec_hash"],
          }
          pathlib.Path("gate_result.json").write_text(json.dumps(gate_result))
          lr = data.get("latest_report")
          if lr is not None:
              pathlib.Path("quality_report.json").write_text(json.dumps(lr))
          PY
          py_rc=$?
          if [[ "${py_rc}" -ne 0 ]] || [[ ! -f gate_result.json ]]; then
            echo "::warning::Could not derive gate_result.json (state missing or empty history); skipping explain/report."
            exit 0
          fi

          set +e
          apithreshold explain gate_result.json 2>&1 | tee gate_explain.log
          set -e
          if [[ -f quality_report.json ]]; then
            set +e
            apithreshold report "${APITHRESHOLD_SPEC}" quality_report.json 2>&1 | tee gate_report.log
            set -e
          else
            echo "(no quality_report.json in state — report skipped)" | tee gate_report.log
          fi

          {
            echo ""
            echo "### LLM recommendations (after failure)"
            echo ""
            echo "From \`apithreshold explain\` plus \`apithreshold report\` when the latest quality report was available. Artifact **apithreshold-gate-recommendations** has the full text."
            echo ""
            echo '```text'
          } >> "${GITHUB_STEP_SUMMARY}"
          set +o pipefail
          {
            cat gate_explain.log
            echo ""
            echo "=== apithreshold report ==="
            cat gate_report.log
          } | head -c 480000 >> "${GITHUB_STEP_SUMMARY}" || true
          set -o pipefail
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "=== apithreshold explain gate_result.json ==="
            cat gate_explain.log
            echo ""
            echo "=== apithreshold report ==="
            cat gate_report.log
          } > gate_recommendations.log

      - name: Upload full apithreshold gate log (verbatim)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apithreshold-gate-full-log
          path: gate_full.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload gate recommendation logs
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apithreshold-gate-recommendations
          path: gate_recommendations.log
          if-no-files-found: ignore
          retention-days: 30

      - name: PR comment — APIThreshold result (sticky, same-repo PRs)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- apithreshold-gate-report -->';
            const path = 'gate_pr_comment.md';
            if (!fs.existsSync(path)) {
              core.info('No gate_pr_comment.md; skip PR comment (e.g. job failed before gate step).');
              return;
            }
            const body = marker + '\n' + fs.readFileSync(path, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
