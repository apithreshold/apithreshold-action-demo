name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Local composite actions (`uses: ./...`) cannot use a step-level `secrets:` map (workflow
      # parse error). Pass credentials via `with` from the workflow secrets context instead.
      - name: APIThreshold gate
        uses: ./.github/actions/apithreshold-gate
        with:
          spec: openapi.yaml
          # learning: does not block on score (good first proof). Use enforcing when ready.
          mode: learning
          # Action default is git (backend). When on PyPI: install-source: pypi
          install-source: git
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          backend_github_token: ${{ secrets.BACKEND_GITHUB_TOKEN }}
