name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Clone backend with actions/checkout (correct auth for private repos), then pip install the
# local tree. Avoid `pip install git+https://…` with embedded PATs — unreliable in CI.
env:
  APITHRESHOLD_SPEC: openapi.yaml
  APITHRESHOLD_MODE: learning
  INSTALL_SOURCE: git
  BACKEND_REPOSITORY: apithreshold/backend
  BACKEND_REF: main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      # GITHUB_TOKEN is scoped to *this* repo only — it cannot read another private repo.
      # Do not fall back to github.token when backend is private (that only yields a cryptic 403).
      # If apithreshold/backend is public, set Actions variable BACKEND_IS_PUBLIC=true (see README).
      - name: Backend clone — require PAT unless backend is public
        if: ${{ vars.BACKEND_IS_PUBLIC != 'true' }}
        env:
          PAT: ${{ secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::BACKEND_GITHUB_TOKEN is missing or unavailable (common on PRs from forks). The job GITHUB_TOKEN for this repository cannot clone a private ${BACKEND_REPOSITORY}. Fix: add repository secret BACKEND_GITHUB_TOKEN (fine-grained PAT: Contents Read on that repo; SSO-authorized for the org if required). If ${BACKEND_REPOSITORY} is public, set repository Actions variable BACKEND_IS_PUBLIC to true. See README."
            exit 1
          fi
          echo "BACKEND_GITHUB_TOKEN is set. If checkout still returns 403, the PAT is rejected (wrong repo access, expired token, or missing SSO authorization)."

      - name: Checkout apithreshold backend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: ${{ env.BACKEND_REF }}
          path: _backend_src
          token: ${{ vars.BACKEND_IS_PUBLIC == 'true' && github.token || secrets.BACKEND_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install apithreshold
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${INSTALL_SOURCE}" = "pypi" ]; then
            pip install apithreshold
          else
            pip install "./_backend_src"
          fi

      - name: Run APIThreshold gate
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          apithreshold gate "${APITHRESHOLD_SPEC}" \
            --mode "${APITHRESHOLD_MODE}" \
            --project-id "${{ github.repository }}"
