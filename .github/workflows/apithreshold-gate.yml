name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pass secrets via `secrets:` so the composite action receives them (job `env` alone
      # is not reliably visible inside composite `run` steps — private clone stayed anonymous).
      - name: APIThreshold gate
        uses: ./.github/actions/apithreshold-gate
        with:
          spec: openapi.yaml
          # learning: does not block on score (good first proof). Use enforcing when ready.
          mode: learning
          # Action default is git (backend). When on PyPI: install-source: pypi
          install-source: git
        secrets:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BACKEND_GITHUB_TOKEN: ${{ secrets.BACKEND_GITHUB_TOKEN }}
