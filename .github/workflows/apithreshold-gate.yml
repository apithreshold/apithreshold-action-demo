name: APIThreshold gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      demo_scenario:
        description: "Three-run demo preset (overrides spec_path + mode). Use Custom for manual picks."
        type: choice
        required: true
        default: custom
        options:
          - custom
          - demo-1-progressive-openapi
          - demo-2-fail-enforcing
          - demo-3-happy-enforcing
      spec_path:
        description: "OpenAPI file (ignored when demo_scenario is not Custom)."
        type: choice
        required: true
        default: openapi.yaml
        options:
          - openapi.yaml
          - demo/openapi-ci-happy-path.yaml
          - demo/openapi-demo-fail.yaml
      mode:
        description: "Gate mode — auto = progressive (restore cache, omit --mode); enforcing fails when below threshold."
        type: choice
        required: true
        default: auto
        options:
          - auto
          - enforcing
          - learning
          - warning
          - strict
      scope_path:
        description: "Optional — directory with .apithreshold/scope.yaml, or path to scope.yaml (monorepo). Empty = repo root discovery."
        type: string
        required: false
        default: ""

concurrency:
  group: apithreshold-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Clone backend with git + trimmed token (org secrets often include a trailing newline when
# pasted — actions/checkout passes the raw value and Git returns 403). Probe with gh first.
env:
  # Spec and mode default here for push/PR; workflow_dispatch overrides via job env below.
  INSTALL_SOURCE: git
  BACKEND_REPOSITORY: apithreshold/backend
  BACKEND_REF: main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APITHRESHOLD_SPEC: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.spec_path || 'openapi.yaml' }}
      APITHRESHOLD_SCOPE_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scope_path || '' }}
      APITHRESHOLD_PROJECT_ID: ${{ github.repository }}
      APITHRESHOLD_PERSIST_SCOPE: "false"
      # Public PEM is committed under license/; JWT only in secrets.APITHRESHOLD_LICENSE
      APITHRESHOLD_LICENSE_PUBLIC_KEY_FILE: ${{ github.workspace }}/license/dev-public.pem
      APITHRESHOLD_LICENSE_KID: dev
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v6

      - name: Resolve gate policy (enterprise progressive)
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          IS_FORK="false"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${GITHUB_REPOSITORY}" ]; then
              IS_FORK="true"
            fi
          fi

          USE_CACHE="false"
          PROGRESSIVE="false"
          MODE="enforcing"
          POLICY_LABEL="Explicit enforcing (default)"

          SPEC_FOR_CACHE="${APITHRESHOLD_SPEC}"
          DEMO_SCENARIO="${{ github.event.inputs.demo_scenario }}"
          if [ -z "${DEMO_SCENARIO}" ]; then
            DEMO_SCENARIO="custom"
          fi
          echo "GATE_DEMO_SCENARIO=${DEMO_SCENARIO}" >> "${GITHUB_ENV}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${DEMO_SCENARIO}" in
              demo-1-progressive-openapi)
                SPEC_FOR_CACHE="openapi.yaml"
                echo "APITHRESHOLD_SPEC=openapi.yaml" >> "${GITHUB_ENV}"
                PROGRESSIVE="true"
                USE_CACHE="true"
                MODE=""
                POLICY_LABEL="Demo 1 — progressive openapi.yaml (auto · learning 50%)"
                ;;
              demo-2-fail-enforcing)
                SPEC_FOR_CACHE="demo/openapi-demo-fail.yaml"
                echo "APITHRESHOLD_SPEC=demo/openapi-demo-fail.yaml" >> "${GITHUB_ENV}"
                PROGRESSIVE="false"
                USE_CACHE="true"
                MODE="enforcing"
                POLICY_LABEL="Demo 2 — fail spec + enforcing 95% (red CI + recommendations)"
                ;;
              demo-3-happy-enforcing)
                SPEC_FOR_CACHE="demo/openapi-ci-happy-path.yaml"
                echo "APITHRESHOLD_SPEC=demo/openapi-ci-happy-path.yaml" >> "${GITHUB_ENV}"
                PROGRESSIVE="false"
                USE_CACHE="true"
                MODE="enforcing"
                POLICY_LABEL="Demo 3 — happy spec + enforcing 15% (green CI)"
                ;;
              custom|*)
                DISPATCH_MODE="${{ github.event.inputs.mode }}"
                if [ "${DISPATCH_MODE}" = "auto" ]; then
                  PROGRESSIVE="true"
                  USE_CACHE="true"
                  MODE=""
                  POLICY_LABEL="Progressive (dispatch: auto — cache + omit --mode)"
                else
                  MODE="${DISPATCH_MODE}"
                  USE_CACHE="true"
                  POLICY_LABEL="Explicit ${DISPATCH_MODE} (dispatch)"
                fi
                ;;
            esac
            if [ "${DEMO_SCENARIO}" != "custom" ]; then
              echo "::notice title=Demo scenario::${POLICY_LABEL}"
            fi
          elif [ "${IS_FORK}" = "true" ]; then
            MODE="warning"
            USE_CACHE="false"
            POLICY_LABEL="Fork PR — warning only (no cache write; non-blocking)"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            PROGRESSIVE="true"
            USE_CACHE="true"
            MODE=""
            POLICY_LABEL="Progressive on default branch (cache + auto-advance learning → warning → enforcing)"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            MODE="warning"
            USE_CACHE="true"
            POLICY_LABEL="Same-repo PR — warning (observe; branch-scoped cache; non-blocking)"
          else
            PROGRESSIVE="true"
            USE_CACHE="true"
            MODE=""
            POLICY_LABEL="Progressive on branch push (cache + auto-advance)"
          fi

          echo "is_fork=${IS_FORK}" >> "${GITHUB_OUTPUT}"
          echo "use_cache=${USE_CACHE}" >> "${GITHUB_OUTPUT}"
          echo "progressive=${PROGRESSIVE}" >> "${GITHUB_OUTPUT}"
          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"
          echo "policy_label=${POLICY_LABEL}" >> "${GITHUB_OUTPUT}"

          echo "APITHRESHOLD_PROGRESSIVE=${PROGRESSIVE}" >> "${GITHUB_ENV}"
          echo "APITHRESHOLD_USE_CACHE=${USE_CACHE}" >> "${GITHUB_ENV}"
          echo "APITHRESHOLD_MODE=${MODE}" >> "${GITHUB_ENV}"
          echo "GATE_POLICY_LABEL=${POLICY_LABEL}" >> "${GITHUB_ENV}"
          if [ "${PROGRESSIVE}" = "true" ]; then
            echo "GATE_MODE_DISPLAY=auto (progressive)" >> "${GITHUB_ENV}"
          else
            echo "GATE_MODE_DISPLAY=${MODE}" >> "${GITHUB_ENV}"
          fi

          # Cache scope: spec slug + scope.yaml hash (multi-spec / endpoint slice identity).
          SPEC_SLUG="$(echo "${SPEC_FOR_CACHE}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          SCOPE_HASH="no-scope"
          SCOPE_FILE=""
          if [ -n "${APITHRESHOLD_SCOPE_PATH:-}" ]; then
            SP="${APITHRESHOLD_SCOPE_PATH}"
            if [ -f "${SP}" ] && [ "$(basename "${SP}")" = "scope.yaml" ]; then
              SCOPE_FILE="${SP}"
            elif [ -f "${GITHUB_WORKSPACE}/${SP}/.apithreshold/scope.yaml" ]; then
              SCOPE_FILE="${GITHUB_WORKSPACE}/${SP}/.apithreshold/scope.yaml"
            elif [ -f "${SP}/.apithreshold/scope.yaml" ]; then
              SCOPE_FILE="${SP}/.apithreshold/scope.yaml"
            fi
          elif [ -f "${GITHUB_WORKSPACE}/.apithreshold/scope.yaml" ]; then
            SCOPE_FILE="${GITHUB_WORKSPACE}/.apithreshold/scope.yaml"
          fi
          if [ -n "${SCOPE_FILE}" ]; then
            SCOPE_HASH="$(sha256sum "${SCOPE_FILE}" | awk '{print $1}' | cut -c1-12)"
            echo "GATE_SCOPE_FILE=${SCOPE_FILE}" >> "${GITHUB_ENV}"
          fi
          echo "GATE_CACHE_SCOPE=${SPEC_SLUG}-${SCOPE_HASH}" >> "${GITHUB_ENV}"
          echo "::notice title=Gate cache scope::\`${SPEC_SLUG}-${SCOPE_HASH}\` (spec + scope.yaml hash)"

      - name: Backend auth — diagnose
        run: |
          set -euo pipefail
          echo "BACKEND_REPOSITORY=${BACKEND_REPOSITORY} BACKEND_REF=${BACKEND_REF}"
          echo "BACKEND_IS_PUBLIC (repo Actions variable, must be exactly 'true' to use only GITHUB_TOKEN): '${{ vars.BACKEND_IS_PUBLIC }}'"
          case "${{ vars.BACKEND_IS_PUBLIC }}" in
            true) echo "Mode: treat backend as public → clone uses github.token from this repo." ;;
            *)    echo "Mode: treat backend as private → clone uses BACKEND_GITHUB_TOKEN (org or repo secret, exact name)." ;;
          esac

      - name: Backend clone — require PAT unless backend is public
        if: ${{ vars.BACKEND_IS_PUBLIC != 'true' }}
        env:
          PAT: ${{ secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::BACKEND_GITHUB_TOKEN is missing or unavailable (common on PRs from forks). The job GITHUB_TOKEN for this repository cannot clone a private ${BACKEND_REPOSITORY}. Fix: add repository secret BACKEND_GITHUB_TOKEN (fine-grained PAT: Contents Read on that repo; SSO-authorized for the org if required). If ${BACKEND_REPOSITORY} is public, set repository Actions variable BACKEND_IS_PUBLIC to the exact string true. See README."
            exit 1
          fi
          echo "BACKEND_GITHUB_TOKEN is non-empty (next step trims CR/LF)."

      - name: Clone apithreshold backend (trim PAT; probe then shallow clone)
        shell: bash
        env:
          RAW_TOKEN: ${{ vars.BACKEND_IS_PUBLIC == 'true' && github.token || secrets.BACKEND_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Org/UI secrets often include a trailing newline — breaks HTTPS git auth (403).
          GH_TOKEN="$(printf '%s' "${RAW_TOKEN}" | tr -d '\n\r')"
          export GH_TOKEN
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Token is empty after trim. Check BACKEND_GITHUB_TOKEN / BACKEND_IS_PUBLIC."
            exit 1
          fi
          echo "Anonymous probe: GET /repos/${BACKEND_REPOSITORY} (no auth — sees public repos only)…"
          ANON_HTTP=$(curl -sS -o /tmp/anon_repo.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${BACKEND_REPOSITORY}" || echo "000")
          echo "Anonymous HTTP status: ${ANON_HTTP}"
          case "${ANON_HTTP}" in
            200) echo "Repo metadata is public (anyone can see it exists). If the PAT probe below fails with 404, the token is wrong user, corrupted, or not the PAT you think (wrong secret name / wrong org secret mapping)." ;;
            404) echo "Anonymous 404: repo is private, renamed/moved, or slug is wrong — OR GitHub hides a private repo. Your PAT must explicitly include ${BACKEND_REPOSITORY} (fine-grained: Repository access + Contents:Read + Metadata:Read) and SAML SSO authorized for org." ;;
            *)   echo "Unexpected anonymous status ${ANON_HTTP}." ;;
          esac
          echo "REST probe (authenticated): GET /repos/${BACKEND_REPOSITORY}…"
          if ! gh api "repos/${BACKEND_REPOSITORY}" --header "accept: application/vnd.github+json" \
              --jq '{full_name, private, visibility}' 2>gh_api_err.txt; then
            echo "::error::Authenticated GET /repos/${BACKEND_REPOSITORY} failed (see gh stderr below). HTTP 404 here almost always means: the token identity cannot read that repo (GitHub often uses 404 instead of 403 for private repos). Fix: (1) Fine-grained PAT → Repository access must list **${BACKEND_REPOSITORY}** + **Contents: Read** + **Metadata: Read**. (2) SAML: **Authorize** the PAT for org **${BACKEND_REPOSITORY%%/*}**. (3) Confirm **BACKEND_GITHUB_TOKEN** secret value is that PAT (org secret allowed for this repo, exact name). (4) Confirm slug matches GitHub (owner/casing). gh stderr:"
            cat gh_api_err.txt
            exit 1
          fi
          rm -rf _backend_src
          echo "Shallow clone ${BACKEND_REPOSITORY} @ ${BACKEND_REF}…"
          if ! git clone --depth 1 --branch "${BACKEND_REF}" \
              "https://x-access-token:${GH_TOKEN}@github.com/${BACKEND_REPOSITORY}.git" \
              _backend_src 2>git_clone_err.txt; then
            echo "::error::git clone failed. If REST probe passed but clone failed, try a different BACKEND_REF (default branch). git stderr:"
            cat git_clone_err.txt
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install apithreshold
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${INSTALL_SOURCE}" = "pypi" ]; then
            pip install apithreshold
          else
            pip install "./_backend_src"
          fi

      - name: Restore APIThreshold gate state (Actions cache)
        if: steps.policy.outputs.use_cache == 'true'
        id: gate-state-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ~/.apithreshold/state
          # Per spec + per run so save succeeds and demo specs do not share thresholds.
          key: apithreshold-gate-${{ github.repository }}-${{ github.ref_name }}-${{ env.GATE_CACHE_SCOPE }}-${{ github.run_id }}
          restore-keys: |
            apithreshold-gate-${{ github.repository }}-${{ github.ref_name }}-${{ env.GATE_CACHE_SCOPE }}-

      # Demo 1: always start progressive openapi at learning 50% (never inherit demo 15% thresholds).
      - name: Demo 1 — progressive baseline (openapi.yaml)
        if: env.GATE_DEMO_SCENARIO == 'demo-1-progressive-openapi'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          state_dir = Path.home() / ".apithreshold" / "state" / repo
          state_dir.mkdir(parents=True, exist_ok=True)
          path = state_dir / "gate_state.json"
          state = {
              "project_id": repo,
              "current_mode": "learning",
              "created_at": datetime.now(timezone.utc).isoformat(),
              "config": {},
              "latest_report": None,
              "history": [],
          }
          path.write_text(json.dumps(state, indent=2))
          print("Seeded gate_state.json (learning · default threshold 50%) for progressive demo")
          PY

      # Happy-path demo: lower threshold so LLM variance still "meets bar" in logs.
      # Free tier allows learning/warning only — without APITHRESHOLD_LICENSE use warning + 15%.
      - name: Demo-only gate threshold (happy-path spec)
        if: >-
          (env.GATE_DEMO_SCENARIO == 'demo-3-happy-enforcing' ||
           env.APITHRESHOLD_SPEC == 'demo/openapi-ci-happy-path.yaml') &&
          steps.policy.outputs.progressive != 'true'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          HAS_LICENSE: ${{ secrets.APITHRESHOLD_LICENSE != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          has_license = os.environ.get("HAS_LICENSE") == "true"
          state_dir = Path.home() / ".apithreshold" / "state" / repo
          state_dir.mkdir(parents=True, exist_ok=True)
          path = state_dir / "gate_state.json"
          if has_license:
              mode = "enforcing"
              config = {"threshold_enforcing": 15.0}
              label = "threshold_enforcing=15.0 (Starter+ license)"
          else:
              mode = "warning"
              config = {"threshold_warning": 15.0}
              label = "threshold_warning=15.0 (free tier — enforcing needs APITHRESHOLD_LICENSE)"
          state = {
              "project_id": repo,
              "current_mode": mode,
              "created_at": datetime.now(timezone.utc).isoformat(),
              "config": config,
              "latest_report": None,
              "history": [],
          }
          path.write_text(json.dumps(state, indent=2))
          print(f"Seeded gate_state.json ({label}) for {path}")
          PY

      # Fail-path demo: product enforcing bar (95%) so thin spec scores below threshold.
      - name: Demo-only gate threshold (fail-path spec)
        if: >-
          (env.GATE_DEMO_SCENARIO == 'demo-2-fail-enforcing' ||
           env.APITHRESHOLD_SPEC == 'demo/openapi-demo-fail.yaml') &&
          steps.policy.outputs.progressive != 'true'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GATE_MODE: ${{ env.APITHRESHOLD_MODE }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          mode = os.environ.get("GATE_MODE") or "enforcing"
          state_dir = Path.home() / ".apithreshold" / "state" / repo
          state_dir.mkdir(parents=True, exist_ok=True)
          path = state_dir / "gate_state.json"
          config = {}
          if mode in ("enforcing", "strict"):
              config["threshold_enforcing"] = 95.0
              label = "threshold_enforcing=95.0 (fail-path demo)"
          elif mode == "warning":
              config["threshold_warning"] = 80.0
              label = "threshold_warning=80.0 (fail-path demo)"
          else:
              config["threshold_learning"] = 50.0
              label = "threshold_learning=50.0 (fail-path demo)"
          state = {
              "project_id": repo,
              "current_mode": mode,
              "created_at": datetime.now(timezone.utc).isoformat(),
              "config": config,
              "latest_report": None,
              "history": [],
          }
          path.write_text(json.dumps(state, indent=2))
          print(f"Seeded gate_state.json ({label}) for {path}")
          PY

      - name: Happy-path — align mode with license tier
        if: env.APITHRESHOLD_SPEC == 'demo/openapi-ci-happy-path.yaml'
        shell: bash
        env:
          HAS_LICENSE: ${{ secrets.APITHRESHOLD_LICENSE != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          if [ "${HAS_LICENSE}" = "true" ]; then
            echo "APITHRESHOLD_LICENSE present — enforcing/strict dispatch modes allowed."
            exit 0
          fi
          case "${APITHRESHOLD_MODE}" in
            enforcing|strict)
              echo "APITHRESHOLD_MODE=warning" >> "${GITHUB_ENV}"
              echo "GATE_MODE_DISPLAY=warning (happy-path, free tier)" >> "${GITHUB_ENV}"
              echo "::notice title=Happy-path demo (free tier)::enforcing requires APITHRESHOLD_LICENSE (Starter+). Using **warning** with demo threshold_warning=15% so the job can pass."
              ;;
          esac

      - name: Run APIThreshold gate
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APITHRESHOLD_LICENSE: ${{ secrets.APITHRESHOLD_LICENSE }}
        run: |
          set -uo pipefail
          set +e
          GATE_SCOPE_ARGS=()
          if [ -n "${APITHRESHOLD_SCOPE_PATH:-}" ]; then
            GATE_SCOPE_ARGS=(--scope-path "${APITHRESHOLD_SCOPE_PATH}")
          fi
          if [ "${APITHRESHOLD_PROGRESSIVE}" = "true" ]; then
            apithreshold gate "${APITHRESHOLD_SPEC}" \
              "${GATE_SCOPE_ARGS[@]}" \
              --project-id "${APITHRESHOLD_PROJECT_ID}" \
              --no-persist-scope 2>&1 | tee gate_full.log
          else
            apithreshold gate "${APITHRESHOLD_SPEC}" \
              "${GATE_SCOPE_ARGS[@]}" \
              --mode "${APITHRESHOLD_MODE}" \
              --project-id "${APITHRESHOLD_PROJECT_ID}" \
              --no-persist-scope 2>&1 | tee gate_full.log
          fi
          gate_rc=${PIPESTATUS[0]}
          set -e

          parse_gate_line() {
            local field="$1"
            grep -E "^${field}:" gate_full.log 2>/dev/null | tail -1 | sed -E "s/^${field}:[[:space:]]*//" || true
          }
          GATE_SCORE="$(parse_gate_line Score)"
          GATE_THRESHOLD="$(parse_gate_line Threshold)"
          GATE_MODE_RUN="$(parse_gate_line Mode)"
          GATE_RESULT="$(parse_gate_line Result)"
          LOG_BYTES="$(wc -c < gate_full.log | awk '{print $1}')"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "$gate_rc" -ne 0 ]; then
            QUALITY_ROW="**Below bar** — ${GATE_SCORE:-?} < ${GATE_THRESHOLD:-?} (${GATE_MODE_RUN:-mode})"
            MERGE_ROW="**Blocks merge** — enforcing/strict turns a low score into a red CI job"
            SUMMARY_HEADLINE="**Merge blocked** — quality score **${GATE_SCORE:-?}** is under **${GATE_MODE_RUN:-?}** threshold **${GATE_THRESHOLD:-?}**."
            GATE_ANNOTATION="${GATE_SCORE:-?} below ${GATE_THRESHOLD:-?} (${GATE_MODE_RUN:-mode}) — CI blocked"
          elif echo "${GATE_RESULT}" | grep -qi 'BLOCKED'; then
            QUALITY_ROW="**Below bar** — ${GATE_SCORE:-?} < ${GATE_THRESHOLD:-?} (${GATE_MODE_RUN:-mode})"
            MERGE_ROW="**Does not block merge** — ${GATE_MODE_RUN:-learning/warning} is observe-only in APIThreshold"
            SUMMARY_HEADLINE="**Quality below bar, merge not blocked** — score **${GATE_SCORE:-?}** < **${GATE_THRESHOLD:-?}** in **${GATE_MODE_RUN:-?}** mode."
            GATE_ANNOTATION="${GATE_SCORE:-?} below ${GATE_THRESHOLD:-?} (${GATE_MODE_RUN:-mode}) — observe only"
          else
            QUALITY_ROW="**Meets bar** — ${GATE_SCORE:-?} ≥ ${GATE_THRESHOLD:-?}"
            MERGE_ROW="**Allows merge** (for this mode)"
            SUMMARY_HEADLINE="**Quality meets bar** — score **${GATE_SCORE:-?}** ≥ threshold **${GATE_THRESHOLD:-?}** (**${GATE_MODE_RUN:-?}**)."
            GATE_ANNOTATION="${GATE_SCORE:-?} meets threshold (${GATE_MODE_RUN:-mode})"
          fi

          STATE="${HOME}/.apithreshold/state/${APITHRESHOLD_PROJECT_ID}/gate_state.json"
          HIST_COUNT="—"
          STORED_MODE="—"
          if [[ -f "${STATE}" ]]; then
            read -r HIST_COUNT STORED_MODE < <(python3 -c "
          import json, pathlib, os
          p = pathlib.Path.home() / '.apithreshold/state' / os.environ['APITHRESHOLD_PROJECT_ID'] / 'gate_state.json'
          d = json.loads(p.read_text())
          print(len(d.get('history') or []), d.get('current_mode', '—'))
          ")
          fi

          {
            echo "## APIThreshold gate"
            echo ""
            if [ "${GATE_DEMO_SCENARIO:-custom}" != "custom" ]; then
              echo "**Demo scenario:** \`${GATE_DEMO_SCENARIO}\` — ${GATE_POLICY_LABEL}"
              echo ""
            fi
            echo "${SUMMARY_HEADLINE}"
            echo ""
            echo "| | |"
            echo "|:--|:--|"
            echo "| Spec | \`${APITHRESHOLD_SPEC}\` |"
            if [ -n "${APITHRESHOLD_SCOPE_PATH:-}" ]; then
              echo "| Scope path | \`${APITHRESHOLD_SCOPE_PATH}\` |"
            elif [ -n "${GATE_SCOPE_FILE:-}" ]; then
              echo "| Scope file | \`${GATE_SCOPE_FILE}\` |"
            fi
            echo "| Cache scope | \`${GATE_CACHE_SCOPE}\` |"
            echo "| Mode | \`${GATE_MODE_RUN:-${GATE_MODE_DISPLAY}}\` |"
            echo "| Score / threshold | **${GATE_SCORE:-?}** / **${GATE_THRESHOLD:-?}** |"
            echo "| **1. Quality** | ${QUALITY_ROW} |"
            echo "| **2. Merge / CI** | ${MERGE_ROW} |"
            echo "| Progressive | \`${STORED_MODE}\` · **${HIST_COUNT}** runs cached on \`${GITHUB_REF_NAME}\` |"
            echo ""
            if echo "${GATE_RESULT}" | grep -qi 'BLOCKED' && [ "$gate_rc" -eq 0 ]; then
              echo "> **Why is the workflow green?** APIThreshold separates **measurement** from **enforcement**. In **learning** and **warning**, a below-threshold score is reported as \`BLOCKED\` in the CLI (quality failed the bar), but the process **exit code stays 0** so CI does not fail. Only **enforcing** and **strict** set exit code **1** and turn a low score into a red job. That lets teams see gaps early without blocking every PR during adoption."
              echo ""
            fi
            if [ "${APITHRESHOLD_PROGRESSIVE}" = "true" ] || [ "${GATE_MODE_RUN}" = "learning" ] || [ "${GATE_MODE_RUN}" = "warning" ]; then
              echo "_Ramp: learning 50% (observe) → warning 80% (observe) → enforcing 95% (**blocks**)._"
              echo ""
            fi
            if [ "$gate_rc" -ne 0 ]; then
              echo "**Next:** step **Gate failure recommendations** · artifact **apithreshold-gate-recommendations**"
              echo ""
            fi
            echo "<details><summary>Gate log (${LOG_BYTES} bytes — also in artifact <code>apithreshold-gate-full-log</code>)</summary>"
            echo ""
            echo '```text'
            if [ "${LOG_BYTES}" -le 120000 ] 2>/dev/null; then
              cat gate_full.log
            else
              tail -n 120 gate_full.log
              echo ""
              echo "... (truncated — download artifact for full log)"
            fi
            echo '```'
            echo ""
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "$gate_rc" -ne 0 ]; then
            echo "::error title=APIThreshold gate::${GATE_ANNOTATION}"
          elif echo "${GATE_RESULT}" | grep -qi 'BLOCKED'; then
            echo "::notice title=APIThreshold gate (non-blocking)::${GATE_ANNOTATION}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            {
              echo "### APIThreshold gate"
              echo ""
              echo "${SUMMARY_HEADLINE}"
              echo ""
              echo "| Spec | \`${APITHRESHOLD_SPEC}\` |"
              echo "| Score / threshold | **${GATE_SCORE:-?}** / **${GATE_THRESHOLD:-?}** |"
              echo "| Quality | ${QUALITY_ROW} |"
              echo "| Merge / CI | ${MERGE_ROW} |"
              echo "| [Run](${RUN_URL}) | Summary + artifacts |"
            } > gate_pr_comment.md
          fi

          if [ "$gate_rc" -ne 0 ]; then
            exit "$gate_rc"
          fi

      # Gate stdout is Rich panels + DEBUG only; full remediation needs follow-up LLM calls.
      - name: Gate failure recommendations (explain + report)
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APITHRESHOLD_LICENSE: ${{ secrets.APITHRESHOLD_LICENSE }}
          APITHRESHOLD_SPEC: ${{ env.APITHRESHOLD_SPEC }}
        run: |
          set -euo pipefail
          STATE="${HOME}/.apithreshold/state/${GITHUB_REPOSITORY}/gate_state.json"
          if [[ ! -f "${STATE}" ]]; then
            echo "::warning::No gate state at ${STATE}; skipping explain/report."
            exit 0
          fi
          python3 <<'PY'
          import json
          import os
          import pathlib
          import sys

          repo = os.environ.get("GITHUB_REPOSITORY", "default")
          state_path = pathlib.Path.home() / ".apithreshold" / "state" / repo / "gate_state.json"
          if not state_path.is_file():
              print("Missing state", state_path, file=sys.stderr)
              sys.exit(2)
          data = json.loads(state_path.read_text())
          hist = data.get("history") or []
          if not hist:
              print("Empty history; skipping explain/report", file=sys.stderr)
              sys.exit(2)
          last = hist[-1]
          gate_result = {
              "passed": last["passed"],
              "mode": last["mode"],
              "score": last["score"],
              "threshold": last["threshold"],
              "blocking_issues": last.get("blocking_issues") or [],
              "exit_code": last["exit_code"],
              "spec_hash": last["spec_hash"],
          }
          pathlib.Path("gate_result.json").write_text(json.dumps(gate_result))
          lr = data.get("latest_report")
          if lr is not None:
              pathlib.Path("quality_report.json").write_text(json.dumps(lr))
          PY
          py_rc=$?
          if [[ "${py_rc}" -ne 0 ]] || [[ ! -f gate_result.json ]]; then
            echo "::warning::Could not derive gate_result.json (state missing or empty history); skipping explain/report."
            exit 0
          fi

          set +e
          apithreshold explain gate_result.json 2>&1 | tee gate_explain.log
          set -e
          if [[ -f quality_report.json ]]; then
            set +e
            apithreshold report "${APITHRESHOLD_SPEC}" quality_report.json 2>&1 | tee gate_report.log
            set -e
          else
            echo "(no quality_report.json in state — report skipped)" | tee gate_report.log
          fi

          {
            echo "=== apithreshold explain gate_result.json ==="
            cat gate_explain.log
            echo ""
            echo "=== apithreshold report ==="
            cat gate_report.log
          } > gate_recommendations.log

      - name: Summary — history, quality report, recommendations
        if: always()
        continue-on-error: true
        shell: bash
        env:
          APITHRESHOLD_PROJECT_ID: ${{ env.APITHRESHOLD_PROJECT_ID }}
        run: |
          python3 <<'PY' >> "${GITHUB_STEP_SUMMARY}"
          import json
          import os
          from datetime import datetime
          from pathlib import Path

          repo = os.environ.get("APITHRESHOLD_PROJECT_ID", "")
          state_path = Path.home() / ".apithreshold" / "state" / repo / "gate_state.json"
          if not state_path.is_file():
              print("\n### Gate history\n\n_No cached state yet._\n")
              raise SystemExit(0)

          data = json.loads(state_path.read_text())
          hist = data.get("history") or []

          print("\n### Gate history\n")
          if not hist:
              print("_No runs recorded yet._\n")
          else:
              print("| When | Mode | Score | Threshold | Passed |")
              print("|------|------|-------|-----------|--------|")
              for entry in hist[-8:]:
                  ts = entry.get("timestamp", "")[:16].replace("T", " ")
                  mode = entry.get("mode", "—")
                  score = entry.get("score", "—")
                  thr = entry.get("threshold", "—")
                  passed = "yes" if entry.get("passed") else "no"
                  print(f"| {ts} | `{mode}` | {score} | {thr} | {passed} |")
              if len(hist) > 8:
                  print(f"\n_Showing last 8 of **{len(hist)}** runs. Full state: artifact `apithreshold-gate-state`._\n")
              else:
                  print(f"\n_**{len(hist)}** run(s) on cache key for this branch._\n")

          report = data.get("latest_report")
          print("### Quality report\n")
          if not report:
              print("_No quality report in state for this run._\n")
          else:
              overall = float(report.get("overall_score", 0)) * 10
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Overall | **{overall:.1f}%** (0–10 scale: {report.get('overall_score', '—')}) |")
              print(f"| Coverage | {float(report.get('coverage_score', 0)) * 10:.1f}% |")
              print(f"| Security | {float(report.get('security_score', 0)) * 10:.1f}% |")
              print(f"| Edge cases | {float(report.get('edge_case_score', 0)) * 10:.1f}% |")
              print(f"| Tests | {report.get('total_tests', 0)} (P0 {report.get('p0_count', 0)} · P1 {report.get('p1_count', 0)} · P2 {report.get('p2_count', 0)}) |")
              gen = report.get("generated_at", "")
              if gen:
                  print(f"| Generated | `{str(gen)[:19]}` |")
              print()

              gaps = report.get("gaps") or []
              if gaps:
                  print("**Gaps**")
                  for g in gaps[:8]:
                      print(f"- {g}")
                  if len(gaps) > 8:
                      print(f"- _…and {len(gaps) - 8} more_")
                  print()

              feedback = report.get("endpoint_feedback") or []
              if feedback:
                  print("**Per-endpoint feedback**")
                  print("| Endpoint | Status | Note |")
                  print("|----------|--------|------|")
                  for fb in feedback[:6]:
                      ep = (fb.get("endpoint") or "—")[:40]
                      st = fb.get("status", "—")
                      ra = (fb.get("rationale") or "—").replace("|", "/")[:80]
                      print(f"| `{ep}` | {st} | {ra} |")
                  print()

          recs = (report or {}).get("recommendations") or []
          print("### Recommendations\n")
          if not recs:
              print("_No recommendations in the latest quality report._\n")
          else:
              for i, r in enumerate(recs[:12], 1):
                  print(f"{i}. {r}")
              if len(recs) > 12:
                  print(f"\n_…and **{len(recs) - 12}** more in artifact `apithreshold-gate-state`._")
              print()

          explain = Path("gate_explain.log")
          report_log = Path("gate_report.log")
          if explain.is_file() or report_log.is_file():
              print("### Fix suggestions (explain + report)\n")
              print("_LLM-generated on CI failure — full text in artifact `apithreshold-gate-recommendations`._\n")
              print("<details><summary>Preview</summary>\n")
              print("```text")
              if explain.is_file():
                  text = explain.read_text()
                  print(text[:8000] + ("…\n" if len(text) > 8000 else ""))
              if report_log.is_file():
                  text = report_log.read_text()
                  if explain.is_file():
                      print("\n=== apithreshold report ===\n")
                  print(text[:8000] + ("…\n" if len(text) > 8000 else ""))
              print("```\n")
              print("</details>\n")
          PY

      - name: Export gate state for artifact
        if: always() && steps.policy.outputs.use_cache == 'true'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p _gate_state_export
          SRC="${HOME}/.apithreshold/state/${APITHRESHOLD_PROJECT_ID}/gate_state.json"
          if [[ -f "${SRC}" ]]; then
            cp "${SRC}" _gate_state_export/gate_state.json
          fi

      - name: Save APIThreshold gate state (Actions cache)
        if: always() && steps.policy.outputs.use_cache == 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/.apithreshold/state
          key: apithreshold-gate-${{ github.repository }}-${{ github.ref_name }}-${{ env.GATE_CACHE_SCOPE }}-${{ github.run_id }}

      - name: Upload full apithreshold gate log (verbatim)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: apithreshold-gate-full-log
          path: gate_full.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload gate state snapshot (progressive / audit)
        if: always() && steps.policy.outputs.use_cache == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: apithreshold-gate-state
          path: _gate_state_export/gate_state.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload gate recommendation logs
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: apithreshold-gate-recommendations
          path: gate_recommendations.log
          if-no-files-found: ignore
          retention-days: 30

      - name: PR comment — APIThreshold result (sticky, same-repo PRs)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- apithreshold-gate-report -->';
            const path = 'gate_pr_comment.md';
            if (!fs.existsSync(path)) {
              core.info('No gate_pr_comment.md; skip PR comment (e.g. job failed before gate step).');
              return;
            }
            const body = marker + '\n' + fs.readFileSync(path, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
