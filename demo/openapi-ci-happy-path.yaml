# CI/CD happy-path demo — small *public* OpenAPI (no security schemes).
#
# Why: APIThreshold merges a default `auth_required` security overlay for every
# run; rich bearer-gated CRUD specs tend to get conservative LLM scores (~20%)
# when generated tests do not prove 401/403 on every secured operation. This
# minimal surface keeps risk + generation + scoring fast and stable.
#
# The GitHub Actions workflow seeds a *demo-only* lowering of
# `threshold_warning` (free tier) or `threshold_enforcing` (with license)
# for this file so the happy-path job completes green despite LLM variance.
# Production gates should use the product default (95% enforcing).
openapi: 3.0.3
info:
  title: CI Happy-Path Demo API
  description: |
    Tiny read-only demo contract for CI. No `security` or `securitySchemes`
    — tests focus on happy paths, schemas, and basic error handling only.
  version: 1.0.0
  contact:
    name: APIThreshold demo
    url: https://github.com/apithreshold/apithreshold-action-demo
paths:
  /v1/demo/ping:
    get:
      tags: [Demo]
      summary: Liveness ping
      description: Returns a static JSON payload for monitors and smoke tests.
      operationId: demoPing
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: apithreshold-action-demo
              examples:
                default:
                  value:
                    ok: true
                    service: apithreshold-action-demo
        "500":
          description: Unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
components:
  schemas:
    ErrorBody:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: internal_error
        message:
          type: string
